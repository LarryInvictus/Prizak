<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Prizak</title>

  <link rel="stylesheet" href="prizak.css">
</head>

<body>
  <div class="container">
    <header>
      <div class="tab-bar">
        <div class="brand">Prizak</div>
        <nav class="tabs" role="tablist">
          <button class="tab active" data-target="home">Home</button>
          <button class="tab" data-target="scripts">Scripts</button>
          <button class="tab" data-target="signin">Sign In</button>
        </nav>
      </div>
    </header>

    <main>

      <!-- HOME -->
      <section id="home" class="tab-content active">
        <h1>Welcome to Prizak!</h1>
        <p>Prizak was founded by LarryInvictus. Anything this site says is official.</p>
      </section>

      <!-- SCRIPTS -->
      <section id="scripts" class="tab-content">
        <div class="card">
          <h2>PRIZAK GUI</h2>
          <p class="muted">Copy the string below to load the GUI.</p>

          <textarea id="guiCode" class="code" readonly>
loadstring(game:HttpGet("https://raw.githubusercontent.com/LarryInvictus/Prizak-GUI/main/gui.lua"))()
          </textarea>

          <div class="actions">
            <button class="copy" data-copy="guiCode">Copy</button>
            <span class="copyMsg"></span>
          </div>
        </div>
      </section>

      <!-- SIGN IN -->
      <section id="signin" class="tab-content">
        <div class="card">
          <h2>Sign In</h2>
          <p class="muted">Local sign-in only (no backend yet).</p>

          <div class="signin-form">
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <button id="signinBtn">Sign In</button>
          </div>

          <div id="signinMsg" class="success"></div>
        </div>
      </section>

    </main>
  </div>

  <script src="prizak.js"></script>
</body>
</html>
